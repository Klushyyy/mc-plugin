name: VolcanoEvent
version: ${project.version}
main: com.volcanoEvent.VolcanoEventPlugin
api-version: '1.21'
description: Immersive multi-phase island volcano event

commands:
  volcano:
    description: Volcano event commands
    usage: /volcano <start|stop|skip|pause|setpoint>
    permission: volcano.admin

permissions:
  volcano.admin:
    description: Manage the volcano event
    default: op
